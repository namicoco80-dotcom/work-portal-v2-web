<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>업무Portal</title>
<link rel="manifest" href="/manifest.json">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #7d8590;
    --accent: #58a6ff; --green: #3fb950;
    --font: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 15px; }
  header .v { color: var(--muted); font-size: 11px; margin-left: 6px; }
  nav { display: flex; gap: 2px; padding: 0 16px; border-bottom: 1px solid var(--border); }
  .nav-btn { color: var(--muted); font-size: 13px; padding: 10px 14px; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; cursor: pointer; }
  .nav-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  #main { flex: 1; overflow: auto; padding: 16px; }
  .hidden { display: none; }
  .empty-state { color: var(--muted); padding: 24px; text-align: center; }
</style>
</head>
<body>
  <header>
    <h1>업무Portal <span class="v">v2 Web</span></h1>
  </header>

  <nav>
    <button class="nav-btn active" data-view="calendar">📅 캘린더</button>
    <button class="nav-btn"        data-view="todo">✅ 할 일</button>
    <button class="nav-btn"        data-view="memo">📝 메모</button>
  </nav>

  <div id="main">
    <div id="view-calendar" class="view" data-view="calendar">
      <div class="empty-state">캘린더 로딩 중...</div>
    </div>
    <div id="view-todo" class="view hidden" data-view="todo">
      <div class="empty-state">할 일 로딩 중...</div>
    </div>
    <div id="view-memo" class="view hidden" data-view="memo">
      <div class="empty-state">메모 로딩 중...</div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
